<script type="module">
import { initializeApp } from 'firebase/app';
import { getDatabase, ref, push, onValue, set, remove, update, query, limitToLast, get } from 'firebase/database';

const app = initializeApp({
    apiKey: "AIzaSyDTWmu7mReenRJXFEw-Wxu70ZqfEVHu1ao",

const database = getDatabase(app);

// ─── состояние ───────────────────────────────────────────
let currentRoom = null, currentName = null;

// ─── утилиты ──────────────────────────────────────────────
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function ftime(t) {
    if (!t) return '--:--';
    try { const d = new Date(t); return isNaN(d.getTime()) ? '--:--' : d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
    catch(e) { return '--:--'; }
}
function getColor(n) {
    if (!airway) return '';
    const m = { black:'#b0bec5', blue:'#4db6ac', red:'#ef9a9a', green:'#a5d6a7' };
    return n === currentName ? m[myColor]||'#b0bec5' : m[userColors[n]||'black']||'#b0bec5';
}

// ─── рендер одного сообщения ──────────────────────────────
function renderMsg(msg, id) {
    const ec = messagesArea.querySelector('.empty-chat');
    if (ec) ec.remove();

    const own = msg.userName === currentName,
        time = ftime(msg.time),
        ed = msg.edited ? ' (ред.)' : '';

    const row = document.createElement('div');
    row.className = `message-row ${own ? 'user' : 'friend'}`;

            const bi = document.createElement('div');
            bi.className = 'bubble-image';
            const img = document.createElement('img');
            img.src = msg.data;
            img.loading = 'lazy';

            bi.appendChild(img);
            contentDiv.appendChild(bi);

            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.fontSize = fontSize + 'px';
            b.textContent = msg.text || '';
            contentDiv.appendChild(b);
        }

        const meta = document.createElement('div');
        meta.className = 'message-meta';
        if (own) {
            meta.innerHTML = `<span class="msg-time">${esc(time)}${esc(ed)}</span><span>${esc(msg.userName)}</span>`;
        } else {
            meta.innerHTML = `<span>${esc(msg.userName)}</span><span class="msg-time">${esc(time)}${esc(ed)}</span>`;
        }
        contentDiv.appendChild(meta);

        if (own && msg.userName !== 'чат') {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';

            if (msg.type !== 'image') {
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="M15 5l4 4"/></svg>';
                editBtn.onclick = e => { e.stopPropagation(); startEdit(id); };
                actionsDiv.appendChild(editBtn);
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'action-btn';
            delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 7l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/><path d="M9 3h6"/></svg>';
            delBtn.onclick = e => { e.stopPropagation(); showDel(id); };
            actionsDiv.appendChild(delBtn);

            contentDiv.appendChild(actionsDiv);
        }

        row.appendChild(contentDiv);
    } else {
        const b = document.createElement('div');
        b.className = 'bubble';
        b.style.fontSize = fontSize + 'px';
        b.style.padding = '2px 8px';

        if (msg.type === 'image') {
            const img = document.createElement('img');
            img.src = msg.data;
            img.style.maxWidth = '200px';
            img.style.borderRadius = '12px';
            img.onclick = e => { e.stopPropagation(); openViewer(msg.data); };
            b.appendChild(img);
        } else {
            const ns = document.createElement('span');
            ns.style.color = getColor(msg.userName);
            ns.textContent = msg.userName;
            b.appendChild(ns);
            b.appendChild(document.createTextNode(': ' + (msg.text || '')));
        }

        row.appendChild(b);
        row.style.justifyContent = 'flex-start';
        row.style.flexDirection = 'row';
        row.style.alignSelf = 'flex-start';
    }

    messagesArea.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

// ─── перерисовка всех сообщений ───────────────────────────
function redrawAllMessages(data) {
    if (!data) {
        messagesArea.innerHTML = '<div class="empty-chat">🍃 здесь пока тишина</div>';
        return;
    }

    if (editingId && document.activeElement === messageInput) {
        return;
    }

    const arr = Object.entries(data).sort((a, b) => (a[1].time||'').localeCompare(b[1].time||''));
    
    messagesArea.innerHTML = '';
    arr.forEach(([id, msg]) => renderMsg(msg, id));
    
    if (!arr.length) {
        messagesArea.innerHTML = '<div class="empty-chat">🍃 здесь пока тишина</div>';
    }

    if (document.activeElement !== messageInput) {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
}

// ─── загрузка сообщений ───────────────────────────────────
function loadMsgs() {
    if (!currentRoom) return;
    if (messagesListener) { messagesListener(); messagesListener = null; }
    messagesArea.innerHTML = '<div class="empty-chat">🍃 загрузка...</div>';

    const mref = query(ref(database, `rooms/${currentRoom}/messages`), limitToLast(100));
    messagesListener = onValue(mref, s => {
        const data = s.val();
        messagesCache = data || {};
        redrawAllMessages(data);
    });
}

// ─── редактирование ───────────────────────────────────────
function startEdit(id) {
    const el = document.querySelector(`.message-row[data-id="${id}"] .bubble`);
    if (!el) return;
    
    editingId = id;
    messageInput.value = el.textContent || '';
    messageInput.focus();
    messageInput.setSelectionRange(messageInput.value.length, messageInput.value.length);
    autoResize();
    
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    sendBtn.style.background = 'var(--accent-dark)';
}

function cancelEdit() {
    editingId = null;
    messageInput.value = '';
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
    sendBtn.style.background = '';
    autoResize();
    messageInput.blur();
}

async function saveEdit() {
    if (!editingId) return;
    const t = messageInput.value.trim();
    if (!t) { cancelEdit(); return; }
    if (t.length > 500) { alert('сообщение не длиннее 500 символов'); return; }

    const msgRef = ref(database, `rooms/${currentRoom}/messages/${editingId}`);
    const oldMsg = messagesCache[editingId];
    
    try {
        await set(msgRef, {
            ...oldMsg,
            text: t,
            edited: true
        });
        cancelEdit();
    } catch(e) {
        console.error(e);
        alert('не удалось отредактировать');
        cancelEdit();
    }
}

// ─── удаление ─────────────────────────────────────────────
function showDel(id) { pendingDelId = id; deletePopup.classList.add('show'); }
function hideDel() { deletePopup.classList.remove('show'); pendingDelId = null; }

async function delMsg() {
    if (!pendingDelId || !currentRoom) { hideDel(); return; }
    try {
        const snap = await get(ref(database, `rooms/${currentRoom}/messages/${pendingDelId}`));
        const m = snap.val();
        if (!m) { hideDel(); return; }
        if (m.userName !== currentName) { alert('Вы можете удалять только свои сообщения'); hideDel(); return; }
    } catch(e) { hideDel(); return; }
    
    try {
        await remove(ref(database, `rooms/${currentRoom}/messages/${pendingDelId}`));
    } catch(e) {
        console.error(e);
        alert('не удалось удалить');
    }
    hideDel();
}

// ─── переключение комнат ──────────────────────────────────
function switchRoom(r) {
    const cr = r.trim();
    if (!cr) { alert('название комнаты не может быть пустым'); hideRoomPopup(); return; }
    if (cr === currentRoom) { hideRoomPopup(); return; }
    
    if (messagesListener) { messagesListener(); messagesListener = null; }
    if (colorsListener) { colorsListener(); colorsListener = null; }
    cancelEdit();
    currentRoom = cr;
    messagesCache = {};
    addRoomHist(currentRoom);
    roomNameSpan.textContent = `#${currentRoom}`;
    roomStatusSpan.textContent = currentName ? `вы как ${currentName}` : 'войдите, чтобы писать';
    messagesArea.innerHTML = '<div class="empty-chat">🍃 загрузка...</div>';
    loadMsgs();
    if (airway) startColors();
    messageInput.focus();
    hideRoomPopup();
}

// ─── вход / выход ─────────────────────────────────────────
async function exitChat() {
    if (messagesListener) { messagesListener(); messagesListener = null; }
    if (colorsListener) { colorsListener(); colorsListener = null; }
    cancelEdit();
    currentRoom = null; currentName = null; messagesCache = {};
    messagesArea.innerHTML = '<div class="empty-chat">✨ введите ник и комнату</div>';
    roomNameSpan.textContent = 'воздушный чат';
    roomStatusSpan.textContent = 'ожидание входа';
    modal.style.display = 'flex';
    roomInput.value = ''; nameInput.value = ''; messageInput.value = '';
}

function enterChat() {
    const n = nameInput.value.trim(), r = roomInput.value.trim();
    if (!n || !r) { alert('введите ник и код комнаты'); return; }
    currentName = n; currentRoom = r;
    addRoomHist(r);
    localStorage.setItem('last_name', n);
    localStorage.setItem('last_room', r);
    roomNameSpan.textContent = `#${currentRoom}`;
    roomStatusSpan.textContent = `вы как ${currentName}`;
    modal.style.display = 'none';
    messagesArea.innerHTML = '<div class="empty-chat">🍃 загрузка...</div>';
    loadMsgs();
    if (airway) startColors();
    messageInput.focus();
}

// ─── история комнат ───────────────────────────────────────
function saveRooms() { localStorage.setItem('room_history', JSON.stringify(savedRooms)); }
function addRoomHist(r) { if (!savedRooms.includes(r)) { savedRooms.unshift(r); if (savedRooms.length > 5) savedRooms.pop(); saveRooms(); } }
function updPopup() {
    popupRoomList.innerHTML = '';
    if (!savedRooms.length) {
        const d = document.createElement('div');
        d.style.cssText = 'padding:16px;text-align:center;color:var(--text-light);font-size:14px';
        d.textContent = 'нет сохранённых комнат';
        popupRoomList.appendChild(d);
    } else {
        savedRooms.forEach(r => {
            const i = document.createElement('div');
            i.className = 'room-popup-item';
            i.textContent = r;
            i.style.fontSize = fontSize + 'px';
            i.onclick = () => { hideRoomPopup(); switchRoom(r); };
            popupRoomList.appendChild(i);
        });
    }
}
function showRoomPopup() { updPopup(); popupRoomInput.value = ''; roomPopup.classList.add('show'); }
function hideRoomPopup() { roomPopup.classList.remove('show'); }

// ─── отправка сообщений ───────────────────────────────────
async function sendMsg(text) {
    if (!text || !text.trim()) return false;
    if (text.length > 500) { alert('сообщение не длиннее 500 символов'); return false; }
    if (!currentRoom || !currentName) return false;
    try {
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            type: 'text', text: text.trim(), userName: currentName, time: new Date().toISOString()
        });
        return true;
    } catch(e) { alert('ошибка отправки'); return false; }
}

async function sendImage(file) {
    if (file.size > 3 * 1024 * 1024) { alert('файл не больше 3 МБ'); return; }
    if (!currentRoom || !currentName) { modal.style.display = 'flex'; return; }
    
    const oh = sendBtn.innerHTML;
    sendBtn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite"></span>';
    sendBtn.disabled = true;
    
    try {
        const reader = new FileReader();
        const url = await new Promise((res, rej) => {
            reader.onload = e => res(e.target.result);
            reader.onerror = rej;
            reader.readAsDataURL(file);
        });
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            type: 'image', data: url, userName: currentName, time: new Date().toISOString()
        });
    } catch(e) { alert('ошибка загрузки фото'); }
    
    sendBtn.innerHTML = oh;
    sendBtn.disabled = false;
    fileInput.value = '';
}

// ─── настройки ────────────────────────────────────────────
function applyFont() {
    document.body.style.fontSize = fontSize + 'px';
    messageInput.style.fontSize = fontSize + 'px';
    document.querySelectorAll('.bubble').forEach(el => el.style.fontSize = fontSize + 'px');
    fontSizeSpan.textContent = fontSize;
    localStorage.setItem('font_size', fontSize);
}
function applyTheme() {
    if (isDark) {
        document.body.classList.add('dark');
        themeToggle.classList.add('active');
    } else {
        document.body.classList.remove('dark');
        themeToggle.classList.remove('active');
    }
    localStorage.setItem('dark_theme', isDark);
}
function applyAirway() {
    if (airway) {
        document.body.classList.add('airway');
        airwayToggle.classList.add('active');
    } else {
        document.body.classList.remove('airway');
        airwayToggle.classList.remove('active');
    }
    airwayColorRow.style.display = airway ? 'flex' : 'none';
    if (currentRoom && currentName && airway) {
        set(ref(database, `rooms/${currentRoom}/users/${currentName}/color`), myColor);
    }
    localStorage.setItem('airway_enabled', airway);
    localStorage.setItem('my_color', myColor);
    if (currentRoom && messagesListener) {
        redrawAllMessages(messagesCache);
    }
    document.querySelectorAll('.airway-color').forEach(c => {
        c.getAttribute('data-color') === myColor ? c.classList.add('selected') : c.classList.remove('selected');
    });
}
function loadSettings() {
    const sf = localStorage.getItem('font_size');
    if (sf) { fontSize = parseInt(sf); fontSize = Math.min(24, Math.max(12, fontSize)); }
    const st = localStorage.getItem('dark_theme'); if (st !== null) isDark = st === 'true';
    const sa = localStorage.getItem('airway_enabled'); if (sa !== null) airway = sa === 'true';
    const smc = localStorage.getItem('my_color'); if (smc !== null) myColor = smc;
    applyFont(); applyTheme(); applyAirway();
}
function startColors() {
    if (!currentRoom || !airway) return;
    if (colorsListener) colorsListener();
    colorsListener = onValue(ref(database, `rooms/${currentRoom}/users`), s => {
        const u = s.val() || {};
        userColors = {};
        for (const [n, d] of Object.entries(u)) if (d && d.color) userColors[n] = d.color;
        if (messagesCache) redrawAllMessages(messagesCache);
    });
}

// ─── авторесайз поля ввода ────────────────────────────────
function autoResize() {
    messageInput.style.height = 'auto';
    const nh = Math.min(messageInput.scrollHeight, 100);
    messageInput.style.height = nh + 'px';
    messageInput.parentElement.style.maxHeight = nh + 'px';
}

// ─── отправка / сохранение правок ─────────────────────────
async function sendOrSave() {
    if (!currentRoom || !currentName) { modal.style.display = 'flex'; return; }
    if (editingId) { await saveEdit(); return; }
    const t = messageInput.value.trim();
    if (t) {
        const ok = await sendMsg(t);
        if (ok) { messageInput.value = ''; messageInput.style.height = 'auto'; messageInput.focus(); autoResize(); }
    }
}

// ─── просмотр фото ────────────────────────────────────────
function openViewer(url) { imageViewerImg.src = url; imageViewer.classList.add('show'); document.body.style.overflow = 'hidden'; }
function closeViewer() { imageViewer.classList.remove('show'); document.body.style.overflow = ''; }

// ─── обработчики событий ──────────────────────────────────
roomInfo.onclick = showRoomPopup;
settingsBtn.onclick = () => settingsPopup.classList.add('show');
closePopupBtn.onclick = hideRoomPopup;
closeSettingsPopupBtn.onclick = () => settingsPopup.classList.remove('show');
popupRoomInput.onkeypress = e => { if (e.key === 'Enter') { const v = popupRoomInput.value.trim(); if (v) { hideRoomPopup(); switchRoom(v); } } };
fontMinus.onclick = () => { fontSize = Math.max(12, fontSize - 1); applyFont(); };
fontPlus.onclick = () => { fontSize = Math.min(24, fontSize + 1); applyFont(); };
themeToggle.onclick = () => { isDark = !isDark; applyTheme(); };
airwayToggle.onclick = () => { airway = !airway; applyAirway(); if (airway && currentRoom && currentName) startColors(); };
document.querySelectorAll('.airway-color').forEach(c => {
    c.onclick = () => { myColor = c.getAttribute('data-color'); applyAirway(); };
});
deleteConfirmBtn.onclick = delMsg;
deleteCancelBtn.onclick = hideDel;
exitBtn.onclick = async () => { await exitChat(); settingsPopup.classList.remove('show'); };
document.addEventListener('click', e => {
    if (roomPopup.classList.contains('show') && !roomPopup.contains(e.target) && e.target !== roomInfo && !roomInfo.contains(e.target)) hideRoomPopup();
    if (settingsPopup.classList.contains('show') && !settingsPopup.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) settingsPopup.classList.remove('show');
    if (deletePopup.classList.contains('show') && !deletePopup.contains(e.target)) hideDel();
});
joinBtn.onclick = enterChat;
sendBtn.onclick = () => sendOrSave();
attachBtn.onclick = () => fileInput.click();
fileInput.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (!f.type.startsWith('image/')) { alert('выберите изображение'); fileInput.value = ''; return; }
    sendImage(f);
};
messageInput.oninput = autoResize;
messageInput.onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim() || editingId) sendOrSave();
    }
};
imageViewerClose.onclick = closeViewer;
imageViewer.onclick = e => { if (e.target === imageViewer) closeViewer(); };
document.onkeydown = e => { if (e.key === 'Escape' && imageViewer.classList.contains('show')) closeViewer(); };

document.addEventListener('DOMContentLoaded', () => {
    const ln = localStorage.getItem('last_name'), lr = localStorage.getItem('last_room');
    if (ln && lr) { nameInput.value = ln; roomInput.value = lr; enterChat(); }
});
loadSettings();
</script>
</body>
</html>
