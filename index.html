        applySettings();
    }

    function applySettings() {
        document.documentElement.style.setProperty('--font-size-base', currentFontSize + 'px');
        if (vibrationToggle) vibrationEnabled ? vibrationToggle.classList.add('active') : vibrationToggle.classList.remove('active');
        if (fontSizeSpan) fontSizeSpan.innerText = currentFontSize;
        if (airwayToggle) airwayEnabled ? airwayToggle.classList.add('active') : airwayToggle.classList.remove('active');
        if (airwayEnabled) document.body.classList.add('airway'); else document.body.classList.remove('airway');
        if (airwayColorRow) airwayColorRow.style.display = airwayEnabled ? 'flex' : 'none';
        if (currentRoom && currentName && airwayEnabled) {
            const colorRef = ref(database, `rooms/${currentRoom}/users/${currentName}/color`);
            set(colorRef, myColor);
        }
        airwayColors.forEach(c => {
            if (c.getAttribute('data-color') === myColor) c.classList.add('selected');
            else c.classList.remove('selected');
        });
        localStorage.setItem('vibration_enabled', vibrationEnabled);
        localStorage.setItem('font_size', currentFontSize);
        localStorage.setItem('airway_enabled', airwayEnabled);
        localStorage.setItem('my_color', myColor);
        renderAllMessages();
    }

    function setVibration(enabled) { vibrationEnabled = enabled; applySettings(); }
    function changeFontSize(delta) { currentFontSize = Math.min(24, Math.max(12, currentFontSize + delta)); applySettings(); }
    function setAirway(enabled) { airwayEnabled = enabled; applySettings(); }
    function setMyColor(color) { myColor = color; applySettings(); }

    function startColorsListener() {
        if (!currentRoom || !airwayEnabled) return;
        if (colorsListener) colorsListener();
        const colorsRef = ref(database, `rooms/${currentRoom}/users`);
        colorsListener = onValue(colorsRef, (snapshot) => {
            const users = snapshot.val() || {};
            userColors = {};
            for (const [name, data] of Object.entries(users)) {
                if (data.color) userColors[name] = data.color;
                else userColors[name] = 'black';
            }
            renderAllMessages();
        });
    }

    function stopColorsListener() {
        if (colorsListener) { colorsListener(); colorsListener = null; }
    }

    settingsBtn.onclick = () => settingsModal.style.display = 'flex';
    closeSettingsBtn.onclick = () => settingsModal.style.display = 'none';
    vibrationToggle.onclick = () => setVibration(!vibrationEnabled);
    fontMinus.onclick = () => changeFontSize(-1);
    fontPlus.onclick = () => changeFontSize(1);
    airwayToggle.onclick = () => setAirway(!airwayEnabled);
    airwayColors.forEach(c => { c.onclick = () => setMyColor(c.getAttribute('data-color')); });
    settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.style.display = 'none'; };

    function fixMobilePadding() { if (document.activeElement === messageInput) { setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50); } }
    window.addEventListener('resize', fixMobilePadding);
    window.addEventListener('focus', fixMobilePadding, true);

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    
    function getColorForUser(username) {
        if (!airwayEnabled) return '';
        if (username === currentName) {
            let colorMap = { black: '#1a1a1a', blue: '#0066cc', red: '#cc3333', green: '#339933' };
            let darkColorMap = { black: '#ffffff', blue: '#66ccff', red: '#ff6666', green: '#66ff66' };
            let isDark = document.body.classList.contains('dark');
            return isDark ? darkColorMap[myColor] : colorMap[myColor];
        } else {
            let friendColor = userColors[username] || 'black';
            let colorMap = { black: '#1a1a1a', blue: '#0066cc', red: '#cc3333', green: '#339933' };
            let darkColorMap = { black: '#ffffff', blue: '#66ccff', red: '#ff6666', green: '#66ff66' };
            let isDark = document.body.classList.contains('dark');
            return isDark ? darkColorMap[friendColor] : colorMap[friendColor];
        }
    }

    function addMessageToDOM(msg, msgId) {
        const div = document.createElement('div');
        div.className = `message-row ${msg.user === currentName ? 'user' : 'friend'}`;
        div.setAttribute('data-id', msgId);
        const time = new Date(msg.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        let editedMark = msg.edited ? ' (ред.)' : '';
        let content = msg.type === 'image' ? `<div class="bubble-image"><img src="${msg.data}" alt="photo"></div>` : `<div class="bubble">${escapeHtml(msg.text)}</div>`;
        
        if (!airwayEnabled) {
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (msg.user === currentName) {
                contentDiv.innerHTML = `${content}<div class="message-meta"><span>${time}${editedMark}</span><span>${escapeHtml(msg.user)}</span></div>`;
            } else {
                contentDiv.innerHTML = `${content}<div class="message-meta"><span>${escapeHtml(msg.user)}</span><span>${time}${editedMark}</span></div>`;
            }
            
            if (msg.user === currentName && msg.user !== 'чат') {
                const actionsDiv = document.createElement('div');
                              actionsDiv.className = 'message-actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="M15 5l4 4"/></svg>`;
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    startEditing(msgId, msg.text);
                };
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'action-btn';
                deleteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 7l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/><path d="M9 3h6"/></svg>`;
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    showConfirmDialog('Удалить сообщение для всех?', () => {
                        const msgRef = ref(database, `rooms/${currentRoom}/messages/${msgId}`);
                        remove(msgRef);
                    });
                };
                
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);
                contentDiv.appendChild(actionsDiv);
            }
            div.appendChild(contentDiv);
        } else {
            let displayName = msg.user === currentName ? currentName : msg.user;
            if (msg.user === 'чат') displayName = 'чат';
            let colorStyle = msg.user !== 'чат' ? `style="color: ${getColorForUser(msg.user)};"` : '';
            div.innerHTML = `<div class="bubble" style="padding:2px 8px; text-align:left;"><span ${colorStyle}>${escapeHtml(displayName)}</span>: ${escapeHtml(msg.text)}</div>`;
            div.style.justifyContent = 'flex-start';
            div.style.flexDirection = 'row';
            div.style.alignSelf = 'flex-start';
        }
        
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        
        if (vibrationEnabled && navigator.vibrate && msg.user !== 'чат') {
            navigator.vibrate(30);
        }
    }

    function renderAllMessages() {
        if (!messagesArea) return;
        if (messages.length === 0) { messagesArea.innerHTML = '<div class="empty-chat">🌿 здесь пока тишина</div>'; return; }
        messagesArea.innerHTML = '';
        messages.forEach(msg => addMessageToDOM(msg, msg.id));
    }

    function loadMessagesFromFirebase() {
        if (!currentRoom) return;
        if (messagesRef) messagesRef();
        messagesRef = onValue(ref(database, `rooms/${currentRoom}/messages`), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                messages = Object.entries(data).map(([id, msg]) => ({ ...msg, id }));
                messages.sort((a, b) => new Date(a.time) - new Date(b.time));
            } else {
                messages = [];
            }
            renderAllMessages();
        });
    }

    async function addMessage(type, content) {
        if (type === 'text' && !content.trim()) return;
        const newMsg = { id: Date.now(), type: type, user: currentName, time: new Date().toISOString() };
        if (type === 'text') newMsg.text = content.slice(0, 500);
        else if (type === 'image') newMsg.data = content;
        try { 
            const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
            await push(msgsRef, newMsg);
        } catch(e) { console.warn('Firebase error:', e); }
    }

    async function saveEditedMessage() {
        if (!editingMessageId) return;
        const newText = messageInput.value.trim();
        if (newText && newText !== messages.find(m => m.id === editingMessageId)?.text) {
            const msgRef = ref(database, `rooms/${currentRoom}/messages/${editingMessageId}`);
            await update(msgRef, { text: newText, edited: true });
        }
        cancelEditing();
    }

    function exitChat() {
        if (messagesRef) { messagesRef(); messagesRef = null; }
        if (colorsListener) { colorsListener(); colorsListener = null; }
        cancelEditing();
        currentRoom = null; currentName = null; messages = [];
        if (messagesArea) messagesArea.innerHTML = '<div class="empty-chat">✨ введите код комнаты и имя</div>';
        if (roomNameSpan) roomNameSpan.innerText = 'тихий чат';
        if (roomStatusSpan) roomStatusSpan.innerText = 'ожидание входа';
        if (modal) modal.style.display = 'flex';
        if (roomInput) roomInput.value = '';
        if (nameInput) nameInput.value = '';
        if (messageInput) messageInput.value = '';
    }

    function enterChat() {
        const room = roomInput.value.trim(), name = nameInput.value.trim();
        if (!room || !name) { alert('введите код комнаты и имя'); return; }
        currentRoom = room; currentName = name;
        localStorage.setItem('last_room', room); localStorage.setItem('last_name', name);
        roomNameSpan.innerText = `#${room}`; roomStatusSpan.innerText = `вы как ${name}`;
        modal.style.display = 'none';
        loadMessagesFromFirebase();
        startColorsListener();
        messageInput.focus();
    }

    const lastRoom = localStorage.getItem('last_room'), lastName = localStorage.getItem('last_name');
    if (lastRoom && lastName) { roomInput.value = lastRoom; nameInput.value = lastName; setTimeout(enterChat, 100); }

    async function sendOrSave() {
        if (!currentRoom || !currentName) { modal.style.display = 'flex'; return; }
        if (editingMessageId) {
            await saveEditedMessage();
        } else {
            const text = messageInput.value.trim();
            if (text) { 
                addMessage('text', text); 
                messageInput.value = ''; 
                messageInput.style.height = 'auto'; 
                messageInput.focus();
                autoResize();
            }
        }
    }

    function autoResize() { 
        messageInput.style.height = 'auto'; 
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px'; 
    }
    messageInput.addEventListener('input', autoResize);

    attachBtn.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('выберите изображение'); return; }
        if (!currentRoom || !currentName) { modal.style.display = 'flex'; fileInput.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (ev) => { addMessage('image', ev.target.result); fileInput.value = ''; };
        reader.readAsDataURL(file);
    };

    joinBtn.onclick = enterChat;
    sendBtn.onclick = sendOrSave;
    exitBtn.onclick = exitChat;
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendOrSave();
        }
    });

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeBtn.onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); applySettings(); };

    loadSettings();
</script>
</body>
</html>
