<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>темный чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* === ТЕМА ИЗ СТАРОГО КОДА === */
        :root { 
            --bg: #fef7e8; 
            --surface: #fff5e6; 
            --border: #f0e0cc; 
            --text: #4a3a2a; 
            --text-light: #8b7355; 
            --text-meta: #8b7355;
            --accent: #e8a87c; 
            --accent-dark: #d48c5b; 
            --input-bg: #fffaf2;
            --airway-bg: #fef7e8;
            --bubble-friend: rgba(255, 255, 245, 0.9);
            --bubble-user: rgba(232, 168, 124, 0.9);
            --bubble-user-text: #ffffff;
            --bubble-friend-text: #4a3a2a;
            --topbar-bg: rgba(254, 247, 232, 0.75);
            --inputpanel-bg: rgba(254, 247, 232, 0.75);
            --popup-bg: rgba(255, 245, 230, 0.85);
            --popup-text: #4a3a2a;
            --popup-border: rgba(240, 224, 204, 0.6);
            --popup-item-hover: rgba(240, 224, 204, 0.4);
            --action-bg: rgba(255, 245, 230, 0.85);
        }
        
        body.dark {
            --bg: #1e2a2a; 
            --surface: #2a3a3a; 
            --border: #3a4a4a; 
            --text: #e8e0d0; 
            --text-light: #b0a898; 
            --text-meta: #b0a898;
            --accent: #7cb8b8; 
            --accent-dark: #5a9898; 
            --input-bg: #2a3a3a;
            --airway-bg: #1e2a2a;
            --bubble-friend: rgba(255, 255, 240, 0.08);
            --bubble-user: rgba(124, 184, 184, 0.8);
            --bubble-user-text: #ffffff;
            --bubble-friend-text: #e8e0d0;
            --topbar-bg: rgba(30, 42, 42, 0.75);
            --inputpanel-bg: rgba(42, 58, 58, 0.75);
            --popup-bg: rgba(30, 42, 42, 0.85);
            --popup-text: #e8e0d0;
            --popup-border: rgba(58, 74, 74, 0.6);
            --popup-item-hover: rgba(255, 255, 255, 0.05);
            --action-bg: rgba(30, 42, 42, 0.85);
        }
        
        /* Фоновые листья клёна — 18 штук (из старого кода) */
        .leaf-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 0; 
            overflow: hidden; 
        }
        .leaf { 
            position: absolute; 
            font-size: 42px; 
            opacity: 0.12; 
            transform: rotate(var(--rot, 0deg)); 
        }
        .leaf:nth-child(1) { top: 3%; left: 2%; --rot: 15deg; }
        .leaf:nth-child(2) { top: 8%; right: 5%; --rot: -25deg; }
        .leaf:nth-child(3) { top: 18%; left: 15%; --rot: 35deg; }
        .leaf:nth-child(4) { top: 25%; right: 20%; --rot: -10deg; }
        .leaf:nth-child(5) { top: 35%; left: 8%; --rot: 45deg; }
        .leaf:nth-child(6) { top: 42%; right: 12%; --rot: -35deg; }
        .leaf:nth-child(7) { top: 50%; left: 25%; --rot: 20deg; }
        .leaf:nth-child(8) { top: 55%; right: 30%; --rot: -45deg; }
        .leaf:nth-child(9) { top: 62%; left: 5%; --rot: 10deg; }
        .leaf:nth-child(10) { top: 68%; right: 8%; --rot: -20deg; }
        .leaf:nth-child(11) { top: 75%; left: 18%; --rot: 30deg; }
        .leaf:nth-child(12) { top: 82%; right: 22%; --rot: -15deg; }
        .leaf:nth-child(13) { top: 88%; left: 35%; --rot: 40deg; }
        .leaf:nth-child(14) { top: 92%; right: 40%; --rot: -30deg; }
        .leaf:nth-child(15) { top: 12%; left: 45%; --rot: 5deg; }
        .leaf:nth-child(16) { top: 45%; left: 60%; --rot: -50deg; }
        .leaf:nth-child(17) { top: 70%; left: 70%; --rot: 25deg; }
        .leaf:nth-child(18) { top: 30%; right: 45%; --rot: -5deg; }
        body.dark .leaf { opacity: 0.07; }
        
        body { 
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-size: 15px; 
            position: relative; 
            overflow: hidden; 
            margin: 0; 
            padding: 0; 
        }
        
        .messages-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 80px 16px 90px 16px;
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            background: var(--surface);
            position: relative;
            z-index: 1;
        }
        
        .top-bar { 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--topbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10;
            padding: 12px 16px;
            padding-top: env(safe-area-inset-top, 12px);
        }
        
        .input-panel { 
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--inputpanel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border);
            display: flex; 
            gap: 8px; 
            align-items: center; 
            padding: 10px 16px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            z-index: 10;
        }
        
        .input-wrapper { 
            flex: 1; 
            background: var(--input-bg); 
            border-radius: 28px; 
            border: 0.5px solid var(--border); 
            overflow-y: auto;
            max-height: 100px;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .chat-input { 
            width: 100%; 
            border: none; 
            background: transparent; 
            font-size: 15px; 
            padding: 10px 16px; 
            outline: none; 
            color: var(--text); 
            resize: none; 
            font-family: inherit; 
            line-height: 1.4;
            display: block;
        }
        .chat-input::-webkit-scrollbar { width: 4px; }
        .chat-input::-webkit-scrollbar-track { background: transparent; }
        .chat-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .room-info { flex: 1; cursor: pointer; }
        .room-name { 
            font-size: 16px; 
            font-weight: 590; 
            color: var(--text); 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            background: rgba(142, 154, 175, 0.12);
            padding: 6px 12px;
            border-radius: 30px;
        }
        .room-name:active { background: var(--border); transform: scale(0.96); }
        .room-name::after { content: '⌵'; font-size: 12px; opacity: 0.5; }
        .room-meta { font-size: 10px; color: var(--text-light); margin-top: 2px; margin-left: 12px; }
        
        .header-buttons { display: flex; gap: 4px; }
        
        .icon-btn { background: rgba(142, 154, 175, 0.12); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn:active { background: var(--border); transform: scale(0.94); }
        .icon-btn svg { width: 18px; height: 18px; stroke: var(--text-light); stroke-width: 1.5; fill: none; }
        
        .attach-btn, .send-action { 
            background: transparent; 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
        }
        .attach-btn:active, .send-action:active { transform: scale(0.92); background: var(--border); }
        .attach-btn svg { width: 20px; height: 20px; stroke: var(--text-light); stroke-width: 1.5; }
        .send-action { background: var(--accent); }
        .send-action svg { width: 18px; height: 18px; stroke: white; stroke-width: 2; }
        #fileInput { display: none; }
        
        .message-row { display: flex; position: relative; align-items: flex-end; max-width: 82%; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
        .message-row.friend { align-self: flex-start; margin-right: auto; }
        .message-content { display: flex; flex-direction: column; max-width: 100%; position: relative; }
        .message-row.user .message-content { align-items: flex-end; }
        
        .bubble { 
            padding: 10px 14px; 
            font-size: 15px; 
            line-height: 1.4; 
            border-radius: 18px; 
            word-break: break-word; 
            transition: transform 0.1s ease;
            cursor: pointer;
        }
        .user .bubble { 
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }
        .friend .bubble { 
            background: var(--bubble-friend);
            color: var(--bubble-friend-text);
            border-bottom-left-radius: 4px;
        }
        .bubble:active { transform: scale(0.98); }
        
        .bubble-image { padding: 4px; max-width: 200px; border-radius: 18px; }
        .bubble-image img { width: 100%; border-radius: 14px; display: block; cursor: pointer; transition: transform 0.1s ease; }
        .bubble-image img:active { transform: scale(0.98); }
        
        .message-meta { font-size: 10px; color: var(--text-meta); margin-top: 4px; display: flex; gap: 8px; }
        .message-row.user .message-meta { justify-content: flex-end; }
        
        .message-actions { 
            display: flex; 
            gap: 4px; 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            opacity: 0; 
            visibility: hidden; 
            z-index: 5; 
            background: var(--action-bg);
            backdrop-filter: blur(20px);
            padding: 4px 8px; 
            border-radius: 40px; 
            border: 0.5px solid var(--border);
            white-space: nowrap;
            transition: opacity 0.1s ease, visibility 0.1s ease;
        }
        .message-row.user .message-actions { right: calc(100% + 8px); left: auto; }
        .message-row.friend .message-actions { left: calc(100% + 8px); right: auto; }
        @media (max-width: 550px) {
            .message-row.friend .message-actions { left: auto; right: calc(100% + 8px); }
        }
        .message-row:hover .message-actions { opacity: 1; visibility: visible; }
        
        .action-btn { 
            background: transparent; 
            border: none; 
            padding: 6px; 
            cursor: pointer; 
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:active { transform: scale(0.9); background: var(--popup-item-hover); }
        .action-btn svg { width: 16px; height: 16px; stroke: var(--text-light); stroke-width: 1.8; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message-row { animation: fadeIn 0.15s; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-card { background: var(--surface); border-radius: 36px; padding: 32px 28px; width: 86%; max-width: 340px; text-align: center; border: 0.5px solid var(--border); position: relative; overflow: hidden; }
        .modal-card::before { content: '🍁'; position: absolute; top: -15px; right: -15px; font-size: 80px; opacity: 0.1; transform: rotate(25deg); pointer-events: none; }
        .modal-card::after { content: '🍁'; position: absolute; bottom: -20px; left: -20px; font-size: 90px; opacity: 0.08; transform: rotate(-15deg); pointer-events: none; }
        body.dark .modal-card::before, body.dark .modal-card::after { opacity: 0.05; }
        .modal-card h3 { font-size: 26px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
        .modal-input { width: 100%; padding: 14px 18px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 44px; font-size: 16px; margin-bottom: 14px; color: var(--text); outline: none; }
        .modal-input:focus { border-color: var(--accent); }
        .modal-btn { background: var(--accent); border: none; padding: 14px; border-radius: 44px; width: 100%; color: white; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .modal-btn:active { transform: scale(0.97); background: var(--accent-dark); }
        
        .modal-warning { background: rgba(232, 168, 124, 0.15); border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 14px; margin-top: 16px; text-align: left; }
        .modal-warning-text { font-size: 12px; color: var(--accent-dark); font-weight: 500; }
        body.dark .modal-warning { background: rgba(124, 184, 184, 0.12); }
        body.dark .modal-warning-text { color: var(--accent); }
        
        .room-popup, .settings-popup, .delete-popup {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 280px;
            background: var(--popup-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
            border: 0.5px solid var(--popup-border);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .room-popup.show, .settings-popup.show, .delete-popup.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        .delete-popup { top: 50%; transform: translate(-50%, -50%) scale(0.9); width: 200px; }
        .delete-popup.show { transform: translate(-50%, -50%) scale(1); }
        
        .room-popup-header, .settings-popup-header { padding: 14px 14px 8px 14px; font-size: 15px; font-weight: 500; color: var(--text-light); border-bottom: 0.5px solid var(--popup-border); }
        .room-popup-input { margin: 12px 12px; padding: 10px 12px; background: var(--input-bg); border: 0.5px solid var(--popup-border); border-radius: 30px; font-size: 15px; color: var(--popup-text); width: calc(100% - 24px); outline: none; }
        .room-popup-input:focus { border-color: var(--accent); }
        .room-popup-list { max-height: 240px; overflow-y: auto; margin: 0 8px 8px 8px; }
        .room-popup-item { padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 15px; color: var(--popup-text); }
        .room-popup-item:active { background: var(--popup-item-hover); }
        .room-popup-close, .settings-popup-close { padding: 12px; text-align: center; font-size: 14px; color: var(--text-light); border-top: 0.5px solid var(--popup-border); cursor: pointer; }
        .room-popup-close:active, .settings-popup-close:active { background: var(--popup-item-hover); }
        
        .settings-popup-item { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--popup-border); }
        .settings-label { font-size: 15px; color: var(--popup-text); }
        .settings-toggle { width: 40px; height: 22px; background: rgba(0,0,0,0.2); border-radius: 22px; cursor: pointer; position: relative; }
        body.dark .settings-toggle { background: rgba(255,255,255,0.2); }
        .settings-toggle.active { background: var(--accent); }
        .settings-toggle::after { content: ''; width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: all 0.1s; }
        .settings-toggle.active::after { left: 20px; }
        
        .font-controls { display: flex; gap: 16px; align-items: center; }
        .font-btn { 
            background: rgba(0,0,0,0.05); 
            border: none; 
            width: 32px; 
            height: 32px; 
            border-radius: 32px; 
            font-size: 20px; 
            cursor: pointer; 
            color: var(--popup-text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        body.dark .font-btn { background: rgba(255,255,255,0.1); }
        .font-size-value { font-size: 17px; font-weight: 600; color: var(--popup-text); min-width: 36px; text-align: center; }
        
        .airway-color-select { display: flex; gap: 10px; }
        .airway-color { width: 26px; height: 26px; border-radius: 26px; cursor: pointer; border: 2px solid transparent; transition: all 0.1s; }
        .airway-color.selected { border-color: var(--accent); transform: scale(1.05); }
        
        .delete-popup button { width: 100%; padding: 14px; font-size: 16px; border: none; background: transparent; cursor: pointer; color: var(--popup-text); font-weight: 500; }
        .delete-popup button:first-child { border-bottom: 0.5px solid var(--popup-border); color: #ff6b6b; }
        
        .empty-chat { text-align: center; margin-top: 60px; color: var(--text-light); }
        
        body.airway .messages-area { background: var(--airway-bg); }
        body.airway .message-row { max-width: 100%; margin: 2px 0; justify-content: flex-start !important; flex-direction: row !important; align-self: flex-start !important; }
        body.airway .bubble { background: transparent !important; border: none !important; padding: 2px 6px; border-radius: 0; color: var(--text) !important; cursor: default; }
        body.airway .bubble:active { transform: none; }
        body.airway .message-meta, body.airway .message-actions { display: none; }
        
        /* Просмотр фото */
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .image-viewer.show {
            opacity: 1;
            visibility: visible;
        }
        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: zoomIn 0.2s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .image-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.1s;
        }
        .image-viewer-close:active { transform: scale(0.92); background: rgba(255,255,255,0.3); }
        .image-viewer-close svg { width: 22px; height: 22px; stroke: white; stroke-width: 2; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--text-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Фоновые листья клёна — 18 штук -->
<div class="leaf-bg">
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
    <div class="leaf">🍁</div>
</div>

<div class="top-bar">
    <div class="room-info" id="roomInfo">
        <div class="room-name" id="roomName">темный чат</div>
        <div class="room-meta" id="roomStatus">ожидание входа</div>
    </div>
    <div class="header-buttons">
        <button class="icon-btn" id="settingsBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="2"/>
                <circle cx="12" cy="5" r="2"/>
                <circle cx="12" cy="19" r="2"/>
            </svg>
        </button>
    </div>
</div>

<div class="messages-area" id="messagesArea"><div class="empty-chat">🌙 здесь пока тишина</div></div>

<div class="input-panel">
    <button class="attach-btn" id="attachBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif">
    <div class="input-wrapper"><textarea class="chat-input" id="messageInput" rows="1" placeholder="сообщение..."></textarea></div>
    <button class="send-action" id="sendBtn"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
</div>

<div class="modal" id="modal">
    <div class="modal-card">
        <h3 id="modalTitle">войти в чат</h3>
        <input type="text" class="modal-input" id="nameInput" placeholder="ваш ник" autocomplete="off">
        <input type="text" class="modal-input" id="roomInput" placeholder="код комнаты" autocomplete="off">
        <button class="modal-btn" id="joinBtn">начать →</button>
        <div class="modal-warning">
            <div class="modal-warning-text">⚠️ важно: не меняйте ник, чтобы не потерять свои сообщения</div>
        </div>
    </div>
</div>

<div class="room-popup" id="roomPopup">
    <div class="room-popup-header">выбрать комнату</div>
    <input type="text" class="room-popup-input" id="popupRoomInput" placeholder="название" autocomplete="off">
    <div class="room-popup-list" id="popupRoomList"></div>
    <div class="room-popup-close" id="closePopupBtn">закрыть</div>
</div>

<div class="settings-popup" id="settingsPopup">
    <div class="settings-popup-header">настройки</div>
    <div class="settings-popup-item"><span class="settings-label">шрифт</span><div class="font-controls"><button class="font-btn" id="fontMinus">−</button><span class="font-size-value" id="fontSizeValue">15</span><button class="font-btn" id="fontPlus">+</button></div></div>
    <div class="settings-popup-item"><span class="settings-label">тёмная тема</span><div class="settings-toggle" id="themeToggle"></div></div>
    <div class="settings-popup-item"><span class="settings-label">режим AirWay</span><div class="settings-toggle" id="airwayToggle"></div></div>
    <div class="settings-popup-item" id="airwayColorRow" style="display:none;"><span class="settings-label">цвет</span><div class="airway-color-select"><div class="airway-color" style="background:#b0bec5;" data-color="black"></div><div class="airway-color" style="background:#4db6ac;" data-color="blue"></div><div class="airway-color" style="background:#ef9a9a;" data-color="red"></div><div class="airway-color" style="background:#a5d6a7;" data-color="green"></div></div></div>
    <div class="settings-popup-item"><span class="settings-label">выход</span><div style="color:#ff6b6b; font-weight:500; cursor:pointer;" id="exitBtn">выйти</div></div>
    <div class="settings-popup-close" id="closeSettingsPopupBtn">закрыть</div>
</div>

<div class="delete-popup" id="deletePopup">
    <button id="deleteConfirmBtn">Удалить</button>
    <button id="deleteCancelBtn">Отмена</button>
</div>

<!-- Просмотр фото -->
<div class="image-viewer" id="imageViewer">
    <div class="image-viewer-close" id="imageViewerClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <img id="imageViewerImg" src="" alt="preview">
</div>

<script type="importmap">{ "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js", "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js" } }</script>
<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, push, onValue, set, remove, update, query, limitToLast, onChildAdded } from 'firebase/database';
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'firebase/storage';

    const firebaseConfig = {
        apiKey: "AIzaSyDTWmu7mReenRJXFEw-Wxu70ZqfEVHu1ao",
        authDomain: "chatlife-26930.firebaseapp.com",
        databaseURL: "https://chatlife-26930-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chatlife-26930",
        storageBucket: "chatlife-26930.firebasestorage.app",
        messagingSenderId: "329135378723",
        appId: "1:329135378723:web:87a60044b3db7bf992bc96"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const storage = getStorage(app);
    
    let currentRoom = null, currentName = null, messages = [], messagesRef = null, colorsListener = null;
    let currentFontSize = 15;
    let isDarkTheme = false;
    let airwayEnabled = false, myColor = 'black';
    let userColors = {};
    let editingMessageId = null;
    let originalSendSvg = null;
    let savedRooms = JSON.parse(localStorage.getItem('room_history') || '[]');
    let pendingDeleteMsgId = null;
    let lastScrollPos = 0;
    let wasAtBottom = true;
    let isLoadingImage = false;

    // DOM элементы
    const modal = document.getElementById('modal');
    const roomInput = document.getElementById('roomInput');
    const nameInput = document.getElementById('nameInput');
    const joinBtn = document.getElementById('joinBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const roomNameSpan = document.getElementById('roomName');
    const roomStatusSpan = document.getElementById('roomStatus');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const settingsBtn = document.getElementById('settingsBtn');
    const roomInfo = document.getElementById('roomInfo');
    const exitBtnSetting = document.getElementById('exitBtn');
    const roomPopup = document.getElementById('roomPopup');
    const popupRoomInput = document.getElementById('popupRoomInput');
    const popupRoomList = document.getElementById('popupRoomList');
    const closePopupBtn = document.getElementById('closePopupBtn');
    const settingsPopup = document.getElementById('settingsPopup');
    const closeSettingsPopupBtn = document.getElementById('closeSettingsPopupBtn');
    const fontMinus = document.getElementById('fontMinus');
    const fontPlus = document.getElementById('fontPlus');
    const fontSizeSpan = document.getElementById('fontSizeValue');
    const themeToggle = document.getElementById('themeToggle');
    const airwayToggle = document.getElementById('airwayToggle');
    const airwayColorRow = document.getElementById('airwayColorRow');
    const airwayColors = document.querySelectorAll('.airway-color');
    const deletePopup = document.getElementById('deletePopup');
    const deleteConfirmBtn = document.getElementById('deleteConfirmBtn');
    const deleteCancelBtn = document.getElementById('deleteCancelBtn');
    const modalTitle = document.getElementById('modalTitle');
    const modalWarningText = document.querySelector('.modal-warning-text');
    
    // Просмотр фото
    const imageViewer = document.getElementById('imageViewer');
    const imageViewerImg = document.getElementById('imageViewerImg');
    const imageViewerClose = document.getElementById('imageViewerClose');

    function openImageViewer(imageUrl) {
        imageViewerImg.src = imageUrl;
        imageViewer.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeImageViewer() {
        imageViewer.classList.remove('show');
        document.body.style.overflow = '';
    }

    imageViewerClose.addEventListener('click', closeImageViewer);
    imageViewer.addEventListener('click', (e) => {
        if (e.target === imageViewer) closeImageViewer();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && imageViewer.classList.contains('show')) closeImageViewer();
    });

    function saveRoomHistory() { localStorage.setItem('room_history', JSON.stringify(savedRooms)); }
    function addRoomToHistory(room) { if (!savedRooms.includes(room)) { savedRooms.unshift(room); if (savedRooms.length > 5) savedRooms.pop(); saveRoomHistory(); } }
    
    function showRoomPopup() { updatePopupList(); popupRoomInput.value = ''; roomPopup.classList.add('show'); }
    function hideRoomPopup() { roomPopup.classList.remove('show'); }
    function hideSettingsPopup() { settingsPopup.classList.remove('show'); }
    function hideDeletePopup() { deletePopup.classList.remove('show'); pendingDeleteMsgId = null; }

    function updatePopupList() {
        popupRoomList.innerHTML = '';
        if (savedRooms.length === 0) { 
            const emptyDiv = document.createElement('div'); 
            emptyDiv.style.cssText = 'padding:16px;text-align:center;color:var(--text-light);font-size:14px;'; 
            emptyDiv.innerText = 'нет сохранённых комнат'; 
            popupRoomList.appendChild(emptyDiv); 
        } else { 
            savedRooms.forEach(room => { 
                const item = document.createElement('div'); 
                item.className = 'room-popup-item'; 
                item.innerText = room; 
                item.style.fontSize = currentFontSize + 'px';
                item.onclick = () => { hideRoomPopup(); switchToRoom(room); }; 
                popupRoomList.appendChild(item); 
            }); 
        }
    }

    function showDeletePopup(msgId) { pendingDeleteMsgId = msgId; deletePopup.classList.add('show'); }

    function saveScrollPosition() {
        if (!messagesArea) return;
        const scrollHeight = messagesArea.scrollHeight;
        const scrollTop = messagesArea.scrollTop;
        const clientHeight = messagesArea.clientHeight;
        wasAtBottom = scrollHeight - scrollTop - clientHeight < 10;
        lastScrollPos = scrollTop;
    }
    
    function restoreScrollPosition() {
        if (!messagesArea) return;
        if (wasAtBottom) {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        } else {
            messagesArea.scrollTop = Math.min(lastScrollPos, messagesArea.scrollHeight - messagesArea.clientHeight);
        }
    }

    function switchToRoom(newRoom) {
        let cleanRoom = newRoom.trim();
        if (!cleanRoom) { alert('название комнаты не может быть пустым'); hideRoomPopup(); return; }
        if (currentRoom === cleanRoom) { hideRoomPopup(); return; }
        if (messagesRef) { messagesRef(); messagesRef = null; }
        if (colorsListener) { colorsListener(); colorsListener = null; }
        cancelEditing();
        currentRoom = cleanRoom;
        addRoomToHistory(currentRoom);
        roomNameSpan.innerText = `#${currentRoom}`;
        if (currentName) roomStatusSpan.innerText = `вы как ${currentName}`;
        else roomStatusSpan.innerText = `войдите, чтобы писать`;
        loadMessagesFromFirebase();
        if (airwayEnabled) startColorsListener();
        messageInput.focus();
        hideRoomPopup();
    }

    function applyFontSize() {
        document.body.style.fontSize = currentFontSize + 'px';
        if (messageInput) messageInput.style.fontSize = currentFontSize + 'px';
        
        const bubbles = document.querySelectorAll('.bubble');
        bubbles.forEach(el => el.style.fontSize = currentFontSize + 'px');
        
        if (fontSizeSpan) fontSizeSpan.innerText = currentFontSize;
        if (modalTitle) modalTitle.style.fontSize = (currentFontSize + 8) + 'px';
        if (modalWarningText) modalWarningText.style.fontSize = currentFontSize + 'px';
        
        const popupItems = document.querySelectorAll('.room-popup-item, .settings-popup-item .settings-label, .delete-popup button');
        popupItems.forEach(el => el.style.fontSize = currentFontSize + 'px');
        
        localStorage.setItem('font_size', currentFontSize);
    }
    
    function applyTheme() {
        if (isDarkTheme) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        if (themeToggle) isDarkTheme ? themeToggle.classList.add('active') : themeToggle.classList.remove('active');
        localStorage.setItem('dark_theme', isDarkTheme);
    }
    
    function applyAirway() {
        if (airwayEnabled) document.body.classList.add('airway');
        else document.body.classList.remove('airway');
        if (airwayToggle) airwayEnabled ? airwayToggle.classList.add('active') : airwayToggle.classList.remove('active');
        if (airwayColorRow) airwayColorRow.style.display = airwayEnabled ? 'flex' : 'none';
        if (currentRoom && currentName && airwayEnabled) {
            set(ref(database, `rooms/${currentRoom}/users/${currentName}/color`), myColor);
        }
        localStorage.setItem('airway_enabled', airwayEnabled);
        localStorage.setItem('my_color', myColor);
        
        const bubbles = document.querySelectorAll('.bubble');
        bubbles.forEach(el => el.style.fontSize = currentFontSize + 'px');
    }

    function loadSettings() {
        let savedFontSize = localStorage.getItem('font_size');
        if (savedFontSize !== null) { currentFontSize = parseInt(savedFontSize); currentFontSize = Math.min(24, Math.max(12, currentFontSize)); }
        let savedTheme = localStorage.getItem('dark_theme');
        if (savedTheme !== null) isDarkTheme = savedTheme === 'true';
        let savedAirway = localStorage.getItem('airway_enabled');
        if (savedAirway !== null) airwayEnabled = savedAirway === 'true';
        let savedMyColor = localStorage.getItem('my_color');
        if (savedMyColor !== null) myColor = savedMyColor;
        
        applyFontSize();
        applyTheme();
        applyAirway();
        airwayColors.forEach(c => { c.getAttribute('data-color') === myColor ? c.classList.add('selected') : c.classList.remove('selected'); });
    }

    function startColorsListener() {
        if (!currentRoom || !airwayEnabled) return;
        if (colorsListener) colorsListener();
        const colorsRef = ref(database, `rooms/${currentRoom}/users`);
        colorsListener = onValue(colorsRef, (snapshot) => {
            const users = snapshot.val() || {};
            userColors = {};
            for (const [name, data] of Object.entries(users)) if (data && data.color) userColors[name] = data.color;
            const bubbles = document.querySelectorAll('.bubble');
            bubbles.forEach(el => el.style.fontSize = currentFontSize + 'px');
        });
    }

    // Обработчики
    roomInfo.addEventListener('click', showRoomPopup);
    settingsBtn.addEventListener('click', () => settingsPopup.classList.add('show'));
    closePopupBtn.addEventListener('click', hideRoomPopup);
    closeSettingsPopupBtn.addEventListener('click', hideSettingsPopup);
    
    popupRoomInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const val = popupRoomInput.value.trim(); if (val) { hideRoomPopup(); switchToRoom(val); } } });
    
    fontMinus.addEventListener('click', () => { currentFontSize = Math.max(12, currentFontSize - 1); applyFontSize(); });
    fontPlus.addEventListener('click', () => { currentFontSize = Math.min(24, currentFontSize + 1); applyFontSize(); });
    
    themeToggle.addEventListener('click', () => { isDarkTheme = !isDarkTheme; applyTheme(); });
    airwayToggle.addEventListener('click', () => { airwayEnabled = !airwayEnabled; applyAirway(); if (airwayEnabled && currentRoom && currentName) startColorsListener(); });
    
    airwayColors.forEach(c => { c.addEventListener('click', () => { 
        myColor = c.getAttribute('data-color'); 
        airwayColors.forEach(c2 => c2.classList.remove('selected')); 
        c.classList.add('selected'); 
        if (currentRoom && currentName && airwayEnabled) set(ref(database, `rooms/${currentRoom}/users/${currentName}/color`), myColor); 
        localStorage.setItem('my_color', myColor); 
    }); });
    
    deleteConfirmBtn.addEventListener('click', () => { if (pendingDeleteMsgId) { remove(ref(database, `rooms/${currentRoom}/messages/${pendingDeleteMsgId}`)); } hideDeletePopup(); });
    deleteCancelBtn.addEventListener('click', hideDeletePopup);
    exitBtnSetting.addEventListener('click', async () => { await exitChat(); hideSettingsPopup(); });
    
    messagesArea.addEventListener('scroll', saveScrollPosition);
    
    document.addEventListener('click', (e) => {
        if (roomPopup.classList.contains('show') && !roomPopup.contains(e.target) && e.target !== roomInfo && !roomInfo.contains(e.target)) hideRoomPopup();
        if (settingsPopup.classList.contains('show') && !settingsPopup.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) hideSettingsPopup();
        if (deletePopup.classList.contains('show') && !deletePopup.contains(e.target)) hideDeletePopup();
    });

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    
    function getColorForUser(userName) {
        if (!airwayEnabled) return '';
        const colorMap = { black: '#b0bec5', blue: '#4db6ac', red: '#ef9a9a', green: '#a5d6a7' };
        if (userName === currentName) return colorMap[myColor] || '#b0bec5';
        const friendColor = userColors[userName] || 'black';
        return colorMap[friendColor] || '#b0bec5';
    }

    async function uploadImage(file) {
        if (!currentRoom || !currentName) throw new Error('not in chat');
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 8)}.${ext}`;
        const imageRef = storageRef(storage, `rooms/${currentRoom}/images/${fileName}`);
        await uploadBytes(imageRef, file);
        return await getDownloadURL(imageRef);
    }

    function addMessageToDOM(msg, msgId) {
        const isOwn = msg.userName === currentName;
        const div = document.createElement('div');
        div.className = `message-row ${isOwn ? 'user' : 'friend'}`;
        div.setAttribute('data-id', msgId);
        const time = new Date(msg.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const editedMark = msg.edited ? ' (ред.)' : '';
        
        let content = '';
        if (msg.type === 'image') {
            content = `<div class="bubble-image"><img src="${msg.data}" alt="photo" loading="lazy" style="cursor: pointer;"></div>`;
        } else {
            content = `<div class="bubble" style="font-size: ${currentFontSize}px; cursor: pointer;">${escapeHtml(msg.text)}</div>`;
        }
        
        if (!airwayEnabled) {
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isOwn) contentDiv.innerHTML = `${content}<div class="message-meta"><span>${time}${editedMark}</span><span>${escapeHtml(msg.userName)}</span></div>`;
            else contentDiv.innerHTML = `${content}<div class="message-meta"><span>${escapeHtml(msg.userName)}</span><span>${time}${editedMark}</span></div>`;
            
            // Добавляем обработчик клика на фото
            if (msg.type === 'image') {
                const img = contentDiv.querySelector('img');
                if (img) {
                    img.onclick = (e) => {
                        e.stopPropagation();
                        openImageViewer(msg.data);
                    };
                }
            }
            
            if (isOwn && msg.userName !== 'чат') {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="M15 5l4 4"/></svg>`;
                editBtn.onclick = (e) => { e.stopPropagation(); startEditing(msgId, msg.text); };
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'action-btn';
                deleteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 7l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/><path d="M9 3h6"/></svg>`;
                deleteBtn.onclick = (e) => { e.stopPropagation(); showDeletePopup(msgId); };
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);
                contentDiv.appendChild(actionsDiv);
            }
            div.appendChild(contentDiv);
        } else {
            let displayName = msg.userName;
            const colorStyle = msg.userName !== 'чат' ? `style="color: ${getColorForUser(msg.userName)};"` : '';
            div.innerHTML = `<div class="bubble" style="padding:2px 8px; font-size: ${currentFontSize}px"><span ${colorStyle}>${escapeHtml(displayName)}</span>: ${escapeHtml(msg.text)}</div>`;
            div.style.justifyContent = 'flex-start';
            div.style.flexDirection = 'row';
            div.style.alignSelf = 'flex-start';
        }
        messagesArea.appendChild(div);
        if (wasAtBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
        
        // Дополнительная проверка для фото в AirWay режиме
        if (airwayEnabled && msg.type === 'image') {
            const img = div.querySelector('img');
            if (img) {
                img.onclick = (e) => {
                    e.stopPropagation();
                    openImageViewer(msg.data);
                };
            }
        }
    }

    function renderAllMessages() {
        if (!messagesArea) return;
        saveScrollPosition();
        
        if (messages.length === 0) { 
            messagesArea.innerHTML = '<div class="empty-chat">🌙 здесь пока тишина</div>'; 
            return; 
        }
        messagesArea.innerHTML = '';
        messages.forEach(msg => addMessageToDOM(msg, msg.id));
        restoreScrollPosition();
    }

    function loadMessagesFromFirebase() {
        if (!currentRoom) return;
        if (messagesRef) messagesRef();
        const messagesQuery = query(ref(database, `rooms/${currentRoom}/messages`), limitToLast(100));
        messagesRef = onChildAdded(messagesQuery, (snapshot) => {
            const msg = { id: snapshot.key, ...snapshot.val() };
            const existing = messages.find(m => m.id === msg.id);
            if (!existing) {
                messages.push(msg);
                messages.sort((a,b) => new Date(a.time) - new Date(b.time));
                addMessageToDOM(msg, msg.id);
                if (wasAtBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        });
    }

    async function addMessage(type, content) {
        if (type === 'text' && !content.trim()) return;
        const newMsg = { id: Date.now(), type, userName: currentName, time: new Date().toISOString() };
        if (type === 'text') {
            if (content.length > 500) {
                alert('сообщение не длиннее 500 символов');
                return;
            }
            newMsg.text = content;
        } else if (type === 'image') {
            newMsg.data = content;
        }
        try { 
            await push(ref(database, `rooms/${currentRoom}/messages`), newMsg);
            return true;
        } catch(e) { 
            alert('ошибка отправки');
            return false;
        }
    }

    function startEditing(msgId, currentText) {
        editingMessageId = msgId;
        messageInput.value = currentText;
        messageInput.focus();
        originalSendSvg = sendBtn.innerHTML;
        sendBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
        sendBtn.style.background = '#2c6e6e';
        autoResize();
    }

    function cancelEditing() {
        editingMessageId = null;
        messageInput.value = '';
        if (originalSendSvg) sendBtn.innerHTML = originalSendSvg;
        sendBtn.style.background = '';
        originalSendSvg = null;
        autoResize();
    }

    async function saveEditedMessage() {
        if (!editingMessageId) return;
        const newText = messageInput.value.trim();
        if (!newText) { cancelEditing(); return; }
        if (newText.length > 500) { alert('сообщение не длиннее 500 символов'); return; }
        if (newText !== messages.find(m => m.id === editingMessageId)?.text) {
            await update(ref(database, `rooms/${currentRoom}/messages/${editingMessageId}`), { text: newText, edited: true });
        }
        cancelEditing();
    }

    async function exitChat() {
        if (messagesRef) { messagesRef(); messagesRef = null; }
        if (colorsListener) { colorsListener(); colorsListener = null; }
        cancelEditing();
        currentRoom = null; currentName = null; messages = [];
        if (messagesArea) messagesArea.innerHTML = '<div class="empty-chat">✨ введите ник и комнату</div>';
        if (roomNameSpan) roomNameSpan.innerText = 'темный чат';
        if (roomStatusSpan) roomStatusSpan.innerText = 'ожидание входа';
        if (modal) modal.style.display = 'flex';
        if (roomInput) roomInput.value = '';
        if (nameInput) nameInput.value = '';
        if (messageInput) messageInput.value = '';
    }

    function enterChat() {
        const name = nameInput.value.trim(), room = roomInput.value.trim();
        if (!name || !room) { alert('введите ник и код комнаты'); return; }
        currentName = name;
        currentRoom = room;
        addRoomToHistory(currentRoom);
        localStorage.setItem('last_name', name);
        localStorage.setItem('last_room', room);
        roomNameSpan.innerText = `#${currentRoom}`;
        roomStatusSpan.innerText = `вы как ${currentName}`;
        modal.style.display = 'none';
        loadMessagesFromFirebase();
        if (airwayEnabled) startColorsListener();
        messageInput.focus();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const lastName = localStorage.getItem('last_name');
        const lastRoom = localStorage.getItem('last_room');
        if (lastName && lastRoom) { nameInput.value = lastName; roomInput.value = lastRoom; enterChat(); }
    });

    async function sendOrSave() {
        if (!currentRoom || !currentName) { modal.style.display = 'flex'; return; }
        if (editingMessageId) { await saveEditedMessage(); return; }
        const text = messageInput.value.trim();
        if (text) { 
            await addMessage('text', text); 
            messageInput.value = ''; 
            messageInput.style.height = 'auto'; 
            messageInput.focus(); 
            autoResize(); 
        }
    }

    async function sendImage(file) {
        if (file.size > 5 * 1024 * 1024) {
            alert('файл не больше 5 МБ');
            fileInput.value = '';
            return;
        }
        if (!currentRoom || !currentName) { modal.style.display = 'flex'; fileInput.value = ''; return; }
        
        const originalBtnHtml = sendBtn.innerHTML;
        sendBtn.innerHTML = '<div class="loading-spinner"></div>';
        sendBtn.disabled = true;
        isLoadingImage = true;
        
        try {
            const downloadUrl = await uploadImage(file);
            await addMessage('image', downloadUrl);
        } catch(e) {
            alert('ошибка загрузки фото');
        } finally {
            sendBtn.innerHTML = originalBtnHtml;
            sendBtn.disabled = false;
            isLoadingImage = false;
            fileInput.value = '';
        }
    }

    function autoResize() { 
        messageInput.style.height = 'auto'; 
        const newHeight = Math.min(messageInput.scrollHeight, 100);
        messageInput.style.height = newHeight + 'px'; 
        messageInput.parentElement.style.maxHeight = newHeight + 'px';
    }
    
    messageInput.addEventListener('input', autoResize);
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('выберите изображение (JPEG, PNG, WEBP, GIF)'); fileInput.value = ''; return; }
        sendImage(file);
    });
    joinBtn.addEventListener('click', enterChat);
    sendBtn.addEventListener('click', () => { if (!isLoadingImage) sendOrSave(); });
    messageInput.addEventListener('keydown', (e) => { 
        if (e.key === 'Enter' && !e.shiftKey && !isLoadingImage) { 
            e.preventDefault(); 
            const text = messageInput.value.trim();
            if (text || editingMessageId) sendOrSave(); 
        } 
    });
    
    loadSettings();
</script>
</body>
</html>
