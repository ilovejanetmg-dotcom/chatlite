<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>воздушный чат</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--bg:#fef7e8;--surface:rgba(255,245,230,.85);--border:#f0e0cc;--text:#4a3a2a;--text-light:#8b7355;--text-meta:#8b7355;--accent:#e8a87c;--accent-dark:#d48c5b;--input-bg:#fffaf2;--airway-bg:#fef7e8;--bubble-friend:rgba(255,255,245,.95);--bubble-user:rgba(232,168,124,.95);--bubble-user-text:#fff;--bubble-friend-text:#4a3a2a;--topbar-bg:rgba(254,247,232,.65);--inputpanel-bg:rgba(254,247,232,.65);--popup-bg:rgba(255,245,230,.95);--popup-text:#4a3a2a;--popup-border:rgba(240,224,204,.8);--popup-item-hover:rgba(240,224,204,.5);--action-bg:rgba(255,245,230,.9)}
        body.dark{--bg:#1e2a2a;--surface:rgba(30,42,42,.85);--border:#3a4a4a;--text:#e8e0d0;--text-light:#b0a898;--text-meta:#b0a898;--accent:#7cb8b8;--accent-dark:#5a9898;--input-bg:#2a3a3a;--airway-bg:#1e2a2a;--bubble-friend:rgba(255,255,240,.15);--bubble-user:rgba(124,184,184,.85);--bubble-user-text:#fff;--bubble-friend-text:#e8e0d0;--topbar-bg:rgba(30,42,42,.65);--inputpanel-bg:rgba(30,42,42,.65);--popup-bg:rgba(30,42,42,.95);--popup-text:#e8e0d0;--popup-border:rgba(58,74,74,.8);--popup-item-hover:rgba(255,255,255,.08);--action-bg:rgba(30,42,42,.9)}
        
        /* листья */
        .leaf-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
        .leaf{position:absolute;font-size:48px;opacity:.55;color:#d4b48c;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12))}
        body.dark .leaf{opacity:.45;color:#8eb0b0}
        .leaf:nth-child(1){top:3%;left:2%;transform:rotate(15deg)}
        .leaf:nth-child(2){top:8%;right:5%;transform:rotate(-25deg)}
        .leaf:nth-child(3){top:18%;left:15%;transform:rotate(35deg)}
        .leaf:nth-child(4){top:25%;right:20%;transform:rotate(-10deg)}
        .leaf:nth-child(5){top:35%;left:8%;transform:rotate(45deg)}
        .leaf:nth-child(6){top:42%;right:12%;transform:rotate(-35deg)}
        .leaf:nth-child(7){top:50%;left:25%;transform:rotate(20deg)}
        .leaf:nth-child(8){top:55%;right:30%;transform:rotate(-45deg)}
        .leaf:nth-child(9){top:62%;left:5%;transform:rotate(10deg)}
        .leaf:nth-child(10){top:68%;right:8%;transform:rotate(-20deg)}
        .leaf:nth-child(11){top:75%;left:18%;transform:rotate(30deg)}
        .leaf:nth-child(12){top:82%;right:22%;transform:rotate(-15deg)}
        .leaf:nth-child(13){top:88%;left:35%;transform:rotate(40deg)}
        .leaf:nth-child(14){top:92%;right:40%;transform:rotate(-30deg)}
        .leaf:nth-child(15){top:12%;left:45%;transform:rotate(5deg)}
        .leaf:nth-child(16){top:45%;left:60%;transform:rotate(-50deg)}
        .leaf:nth-child(17){top:70%;left:70%;transform:rotate(25deg)}
        .leaf:nth-child(18){top:30%;right:45%;transform:rotate(-5deg)}
        
        body{background:var(--bg);font-family:-apple-system,'Helvetica Neue',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;font-size:15px;position:relative;overflow:hidden}
        .messages-area{flex:1;overflow-y:auto;padding:80px 16px 90px;display:flex;flex-direction:column;gap:6px;background:var(--surface);position:relative;z-index:2}
        .top-bar{position:fixed;top:0;left:0;right:0;background:var(--topbar-bg);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:10;padding:12px 16px;padding-top:env(safe-area-inset-top,12px)}
        .input-panel{position:fixed;bottom:0;left:0;right:0;background:var(--inputpanel-bg);backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;gap:8px;align-items:center;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:10}
        .input-wrapper{flex:1;background:var(--input-bg);border-radius:28px;border:.5px solid var(--border);overflow-y:auto;max-height:100px}
        .input-wrapper:focus-within{border-color:var(--accent)}
        .chat-input{width:100%;border:none;background:transparent;font-size:15px;padding:10px 16px;outline:none;color:var(--text);resize:none;font-family:inherit;line-height:1.4;display:block}
        .room-info{flex:1;cursor:pointer}
        .room-name{font-size:16px;font-weight:590;color:var(--text);display:inline-flex;align-items:center;gap:4px;background:rgba(142,154,175,.12);padding:6px 12px;border-radius:30px}
        .room-name:active{background:var(--border);transform:scale(.96)}
        .room-name::after{content:'⌵';font-size:12px;opacity:.5}
        .room-meta{font-size:10px;color:var(--text-light);margin-top:2px;margin-left:12px}
        .header-buttons{display:flex;gap:4px}
        .icon-btn{background:rgba(142,154,175,.12);border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .icon-btn:active{background:var(--border);transform:scale(.94)}
        .icon-btn svg{width:18px;height:18px;stroke:var(--text-light);stroke-width:1.5;fill:none}
        .attach-btn,.send-action{background:transparent;border:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
        .attach-btn:active,.send-action:active{transform:scale(.92);background:var(--border)}
        .attach-btn svg{width:20px;height:20px;stroke:var(--text-light);stroke-width:1.5}
        .send-action{background:var(--accent)}
        .send-action svg{width:18px;height:18px;stroke:#fff;stroke-width:2}
        #fileInput{display:none}
        .message-row{display:flex;position:relative;align-items:flex-end;max-width:82%}
        .message-row.user{align-self:flex-end;flex-direction:row-reverse;margin-left:auto}
        .message-row.friend{align-self:flex-start;margin-right:auto}
        .message-content{display:flex;flex-direction:column;max-width:100%;position:relative}
        .message-row.user .message-content{align-items:flex-end}
        .bubble{padding:10px 14px;font-size:15px;line-height:1.4;border-radius:18px;word-break:break-word}
        .user .bubble{background:var(--bubble-user);color:var(--bubble-user-text);border-bottom-right-radius:4px}
        .friend .bubble{background:var(--bubble-friend);color:var(--bubble-friend-text);border-bottom-left-radius:4px}
        .bubble-image{padding:4px;max-width:200px;border-radius:18px}
        .bubble-image img{width:100%;border-radius:14px;display:block;cursor:pointer}
        .message-meta{font-size:10px;color:var(--text-meta);margin-top:4px;display:flex;gap:8px}
        .message-row.user .message-meta{justify-content:flex-end}
        .message-actions{display:flex;gap:4px;position:absolute;top:50%;transform:translateY(-50%);opacity:0;visibility:hidden;z-index:5;background:var(--action-bg);backdrop-filter:blur(20px);padding:4px 8px;border-radius:40px;border:.5px solid var(--border);white-space:nowrap;transition:opacity .1s ease,visibility .1s ease}
        .message-row.user .message-actions{right:calc(100% + 8px);left:auto}
        .message-row.friend .message-actions{left:calc(100% + 8px);right:auto}
        @media(max-width:550px){.message-row.friend .message-actions{left:auto;right:calc(100% + 8px)}}
        .message-row:hover .message-actions{opacity:1;visibility:visible}
        .action-btn{background:transparent;border:none;padding:6px;cursor:pointer;border-radius:30px;display:flex;align-items:center;justify-content:center}
        .action-btn:active{transform:scale(.9);background:var(--popup-item-hover)}
        .action-btn svg{width:16px;height:16px;stroke:var(--text-light);stroke-width:1.8}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .message-row{animation:fadeIn .15s}
        
        /* модалки и попапы */
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:100}
        .modal-card{background:var(--popup-bg);backdrop-filter:blur(20px);border-radius:36px;padding:32px 28px;width:86%;max-width:340px;text-align:center;border:.5px solid var(--border);position:relative;overflow:hidden}
        .modal-card::before,.modal-card::after{content:'🍁';position:absolute;font-size:80px;opacity:.12;pointer-events:none}
        .modal-card::before{top:-15px;right:-15px;transform:rotate(25deg)}
        .modal-card::after{bottom:-20px;left:-20px;font-size:90px;transform:rotate(-15deg)}
        body.dark .modal-card::before,body.dark .modal-card::after{opacity:.08}
        .modal-card h3{font-size:26px;font-weight:600;margin-bottom:24px;color:var(--text)}
        .modal-input{width:100%;padding:14px 18px;background:var(--input-bg);border:1px solid var(--border);border-radius:44px;font-size:16px;margin-bottom:14px;color:var(--text);outline:none}
        .modal-input:focus{border-color:var(--accent)}
        .modal-btn{background:var(--accent);border:none;padding:14px;border-radius:44px;width:100%;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-top:6px}
        .modal-btn:active{transform:scale(.97);background:var(--accent-dark)}
        .modal-warning{background:rgba(232,168,124,.2);border-left:3px solid var(--accent);padding:10px 12px;border-radius:14px;margin-top:16px;text-align:left}
        .modal-warning-text{font-size:12px;color:var(--accent-dark);font-weight:500}
        body.dark .modal-warning{background:rgba(124,184,184,.15)}
        body.dark .modal-warning-text{color:var(--accent)}
        
        .room-popup,.settings-popup,.delete-popup{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);width:280px;background:var(--popup-bg);backdrop-filter:blur(20px);border-radius:28px;box-shadow:0 12px 28px rgba(0,0,0,.3);border:.5px solid var(--popup-border);z-index:150;opacity:0;visibility:hidden;transition:all .2s ease;overflow:hidden}
        .room-popup.show,.settings-popup.show,.delete-popup.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
        .delete-popup{top:50%;transform:translate(-50%,-50%) scale(.9);width:200px}
        .delete-popup.show{transform:translate(-50%,-50%) scale(1)}
        .room-popup-header,.settings-popup-header{padding:14px 14px 8px;font-size:15px;font-weight:500;color:var(--text-light);border-bottom:.5px solid var(--popup-border)}
        .room-popup-input{margin:12px;padding:10px 12px;background:var(--input-bg);border:.5px solid var(--popup-border);border-radius:30px;font-size:15px;color:var(--popup-text);width:calc(100% - 24px);outline:none}
        .room-popup-input:focus{border-color:var(--accent)}
        .room-popup-list{max-height:240px;overflow-y:auto;margin:0 8px 8px}
        .room-popup-item{padding:10px 12px;border-radius:12px;cursor:pointer;font-size:15px;color:var(--popup-text)}
        .room-popup-item:active{background:var(--popup-item-hover)}
        .room-popup-close,.settings-popup-close{padding:12px;text-align:center;font-size:14px;color:var(--text-light);border-top:.5px solid var(--popup-border);cursor:pointer}
        .room-popup-close:active,.settings-popup-close:active{background:var(--popup-item-hover)}
        .settings-popup-item{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--popup-border)}
        .settings-label{font-size:15px;color:var(--popup-text)}
        .settings-toggle{width:40px;height:22px;background:rgba(0,0,0,.2);border-radius:22px;cursor:pointer;position:relative}
        body.dark .settings-toggle{background:rgba(255,255,255,.2)}
        .settings-toggle.active{background:var(--accent)}
        .settings-toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .1s}
        .settings-toggle.active::after{left:20px}
        .font-controls{display:flex;gap:16px;align-items:center}
        .font-btn{background:rgba(0,0,0,.05);border:none;width:32px;height:32px;border-radius:32px;font-size:20px;cursor:pointer;color:var(--popup-text);display:flex;align-items:center;justify-content:center}
        body.dark .font-btn{background:rgba(255,255,255,.1)}
        .font-size-value{font-size:17px;font-weight:600;color:var(--popup-text);min-width:36px;text-align:center}
        .airway-color-select{display:flex;gap:10px}
        .airway-color{width:26px;height:26px;border-radius:26px;cursor:pointer;border:2px solid transparent;transition:all .1s}
        .airway-color.selected{border-color:var(--accent);transform:scale(1.05)}
        .delete-popup button{width:100%;padding:14px;font-size:16px;border:none;background:transparent;cursor:pointer;color:var(--popup-text);font-weight:500}
        .delete-popup button:first-child{border-bottom:.5px solid var(--popup-border);color:#ff6b6b}
        .empty-chat{text-align:center;margin-top:60px;color:var(--text-light)}
        body.airway .messages-area{background:var(--airway-bg)}
        body.airway .message-row{max-width:100%;margin:2px 0;justify-content:flex-start!important;flex-direction:row!important;align-self:flex-start!important}
        body.airway .bubble{background:transparent!important;border:none!important;padding:2px 6px;border-radius:0;color:var(--text)!important}
        body.airway .message-meta,body.airway .message-actions{display:none}
        .image-viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .2s;cursor:pointer}
        .image-viewer.show{opacity:1;visibility:visible}
        .image-viewer img{max-width:90%;max-height:90%;object-fit:contain;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:zoomIn .2s}
        @keyframes zoomIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
        .image-viewer-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px)}
        .image-viewer-close:active{transform:scale(.92);background:rgba(255,255,255,.3)}
        .image-viewer-close svg{width:22px;height:22px;stroke:#fff;stroke-width:2}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--text-light);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>

const app=initializeApp(firebaseConfig),database=getDatabase(app),storage=getStorage(app);

const modal=document.getElementById('modal'),roomInput=document.getElementById('roomInput'),nameInput=document.getElementById('nameInput'),joinBtn=document.getElementById('joinBtn'),messagesArea=document.getElementById('messagesArea'),messageInput=document.getElementById('messageInput'),sendBtn=document.getElementById('sendBtn'),roomNameSpan=document.getElementById('roomName'),roomStatusSpan=document.getElementById('roomStatus'),attachBtn=document.getElementById('attachBtn'),fileInput=document.getElementById('fileInput'),settingsBtn=document.getElementById('settingsBtn'),roomInfo=document.getElementById('roomInfo'),exitBtnSetting=document.getElementById('exitBtn'),roomPopup=document.getElementById('roomPopup'),popupRoomInput=document.getElementById('popupRoomInput'),popupRoomList=document.getElementById('popupRoomList'),closePopupBtn=document.getElementById('closePopupBtn'),settingsPopup=document.getElementById('settingsPopup'),closeSettingsPopupBtn=document.getElementById('closeSettingsPopupBtn'),fontMinus=document.getElementById('fontMinus'),fontPlus=document.getElementById('fontPlus'),fontSizeSpan=document.getElementById('fontSizeValue'),themeToggle=document.getElementById('themeToggle'),airwayToggle=document.getElementById('airwayToggle'),airwayColorRow=document.getElementById('airwayColorRow'),airwayColors=document.querySelectorAll('.airway-color'),deletePopup=document.getElementById('deletePopup'),deleteConfirmBtn=document.getElementById('deleteConfirmBtn'),deleteCancelBtn=document.getElementById('deleteCancelBtn'),modalTitle=document.getElementById('modalTitle'),modalWarningText=document.querySelector('.modal-warning-text'),imageViewer=document.getElementById('imageViewer'),imageViewerImg=document.getElementById('imageViewerImg'),imageViewerClose=document.getElementById('imageViewerClose');

imageViewerClose.onclick=closeImageViewer;
imageViewer.onclick=e=>{if(e.target===imageViewer)closeImageViewer()};
document.onkeydown=e=>{if(e.key==='Escape'&&imageViewer.classList.contains('show'))closeImageViewer()};
function saveRoomHistory(){localStorage.setItem('room_history',JSON.stringify(savedRooms))}
function addRoomToHistory(room){if(!savedRooms.includes(room)){savedRooms.unshift(room);if(savedRooms.length>5)savedRooms.pop();saveRoomHistory()}}
function showRoomPopup(){updatePopupList();popupRoomInput.value='';roomPopup.classList.add('show')}
function hideRoomPopup(){roomPopup.classList.remove('show')}
function hideSettingsPopup(){settingsPopup.classList.remove('show')}
function hideDeletePopup(){deletePopup.classList.remove('show');pendingDeleteMsgId=null}
function updatePopupList(){popupRoomList.innerHTML='';if(savedRooms.length===0){const d=document.createElement('div');d.style.cssText='padding:16px;text-align:center;color:var(--text-light);font-size:14px;';d.innerText='нет сохранённых комнат';popupRoomList.appendChild(d)}else savedRooms.forEach(room=>{const item=document.createElement('div');item.className='room-popup-item';item.innerText=room;item.style.fontSize=currentFontSize+'px';item.onclick=()=>{hideRoomPopup();switchToRoom(room)};popupRoomList.appendChild(item)})}
function showDeletePopup(msgId){pendingDeleteMsgId=msgId;deletePopup.classList.add('show')}
function saveScrollPosition(){if(!messagesArea)return;const sh=messagesArea.scrollHeight,st=messagesArea.scrollTop,ch=messagesArea.clientHeight;wasAtBottom=sh-st-ch<10;lastScrollPos=st}
function restoreScrollPosition(){if(!messagesArea)return;if(wasAtBottom)messagesArea.scrollTop=messagesArea.scrollHeight;else messagesArea.scrollTop=Math.min(lastScrollPos,messagesArea.scrollHeight-messagesArea.clientHeight)}
function switchToRoom(newRoom){let cleanRoom=newRoom.trim();if(!cleanRoom){alert('название комнаты не может быть пустым');hideRoomPopup();return}if(currentRoom===cleanRoom){hideRoomPopup();return}if(messagesRef){messagesRef();messagesRef=null}if(colorsListener){colorsListener();colorsListener=null}cancelEditing();currentRoom=cleanRoom;addRoomToHistory(currentRoom);roomNameSpan.innerText=`#${currentRoom}`;if(currentName)roomStatusSpan.innerText=`вы как ${currentName}`;else roomStatusSpan.innerText='войдите, чтобы писать';loadMessagesFromFirebase();if(airwayEnabled)startColorsListener();messageInput.focus();hideRoomPopup()}
function applyFontSize(){document.body.style.fontSize=currentFontSize+'px';if(messageInput)messageInput.style.fontSize=currentFontSize+'px';document.querySelectorAll('.bubble').forEach(el=>el.style.fontSize=currentFontSize+'px');if(fontSizeSpan)fontSizeSpan.innerText=currentFontSize;if(modalTitle)modalTitle.style.fontSize=(currentFontSize+8)+'px';if(modalWarningText)modalWarningText.style.fontSize=currentFontSize+'px';document.querySelectorAll('.room-popup-item, .settings-popup-item .settings-label, .delete-popup button').forEach(el=>el.style.fontSize=currentFontSize+'px');localStorage.setItem('font_size',currentFontSize)}
function applyTheme(){if(isDarkTheme)document.body.classList.add('dark');else document.body.classList.remove('dark');if(themeToggle)isDarkTheme?themeToggle.classList.add('active'):themeToggle.classList.remove('active');localStorage.setItem('dark_theme',isDarkTheme)}
function applyAirway(){if(airwayEnabled)document.body.classList.add('airway');else document.body.classList.remove('airway');if(airwayToggle)airwayEnabled?airwayToggle.classList.add('active'):airwayToggle.classList.remove('active');if(airwayColorRow)airwayColorRow.style.display=airwayEnabled?'flex':'none';if(currentRoom&&currentName&&airwayEnabled)set(ref(database,`rooms/${currentRoom}/users/${currentName}/color`),myColor);localStorage.setItem('airway_enabled',airwayEnabled);localStorage.setItem('my_color',myColor);document.querySelectorAll('.bubble').forEach(el=>el.style.fontSize=currentFontSize+'px')}
function loadSettings(){let sf=localStorage.getItem('font_size');if(sf!==null){currentFontSize=parseInt(sf);currentFontSize=Math.min(24,Math.max(12,currentFontSize))}let st=localStorage.getItem('dark_theme');if(st!==null)isDarkTheme=st==='true';let sa=localStorage.getItem('airway_enabled');if(sa!==null)airwayEnabled=sa==='true';let smc=localStorage.getItem('my_color');if(smc!==null)myColor=smc;applyFontSize();applyTheme();applyAirway();airwayColors.forEach(c=>{c.getAttribute('data-color')===myColor?c.classList.add('selected'):c.classList.remove('selected')})}
function startColorsListener(){if(!currentRoom||!airwayEnabled)return;if(colorsListener)colorsListener();colorsListener=onValue(ref(database,`rooms/${currentRoom}/users`),snapshot=>{const users=snapshot.val()||{};userColors={};for(const[name,data]of Object.entries(users))if(data&&data.color)userColors[name]=data.color;document.querySelectorAll('.bubble').forEach(el=>el.style.fontSize=currentFontSize+'px')})}
roomInfo.onclick=showRoomPopup;
settingsBtn.onclick=()=>settingsPopup.classList.add('show');
closePopupBtn.onclick=hideRoomPopup;
closeSettingsPopupBtn.onclick=hideSettingsPopup;
popupRoomInput.onkeypress=e=>{if(e.key==='Enter'){const val=popupRoomInput.value.trim();if(val){hideRoomPopup();switchToRoom(val)}}};
fontMinus.onclick=()=>{currentFontSize=Math.max(12,currentFontSize-1);applyFontSize()};
fontPlus.onclick=()=>{currentFontSize=Math.min(24,currentFontSize+1);applyFontSize()};
themeToggle.onclick=()=>{isDarkTheme=!isDarkTheme;applyTheme()};
airwayToggle.onclick=()=>{airwayEnabled=!airwayEnabled;applyAirway();if(airwayEnabled&&currentRoom&&currentName)startColorsListener()};
airwayColors.forEach(c=>{c.onclick=()=>{myColor=c.getAttribute('data-color');airwayColors.forEach(c2=>c2.classList.remove('selected'));c.classList.add('selected');if(currentRoom&&currentName&&airwayEnabled)set(ref(database,`rooms/${currentRoom}/users/${currentName}/color`),myColor);localStorage.setItem('my_color',myColor)}});
deleteConfirmBtn.onclick=()=>{if(pendingDeleteMsgId)remove(ref(database,`rooms/${currentRoom}/messages/${pendingDeleteMsgId}`));hideDeletePopup()};
deleteCancelBtn.onclick=hideDeletePopup;
exitBtnSetting.onclick=async()=>{await exitChat();hideSettingsPopup()};
messagesArea.onscroll=saveScrollPosition;
document.onclick=e=>{if(roomPopup.classList.contains('show')&&!roomPopup.contains(e.target)&&e.target!==roomInfo&&!roomInfo.contains(e.target))hideRoomPopup();if(settingsPopup.classList.contains('show')&&!settingsPopup.contains(e.target)&&e.target!==settingsBtn&&!settingsBtn.contains(e.target))hideSettingsPopup();if(deletePopup.classList.contains('show')&&!deletePopup.contains(e.target))hideDeletePopup()};
function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;'))}
function getColorForUser(userName){if(!airwayEnabled)return '';const map={black:'#b0bec5',blue:'#4db6ac',red:'#ef9a9a',green:'#a5d6a7'};if(userName===currentName)return map[myColor]||'#b0bec5';return map[userColors[userName]||'black']||'#b0bec5'}
async function uploadImage(file){if(!currentRoom||!currentName)throw new Error();const ext=file.name.split('.').pop(),fileName=`${Date.now()}_${Math.random().toString(36).substr(2,8)}.${ext}`,imageRef=storageRef(storage,`rooms/${currentRoom}/images/${fileName}`);await uploadBytes(imageRef,file);return await getDownloadURL(imageRef)}
function addMessageToDOM(msg,msgId){const isOwn=msg.userName===currentName,div=document.createElement('div');div.className=`message-row ${isOwn?'user':'friend'}`;div.setAttribute('data-id',msgId);const time=new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),editedMark=msg.edited?' (ред.)':'',content=msg.type==='image'?`<div class="bubble-image"><img src="${msg.data}" alt="photo" loading="lazy" style="cursor:pointer"></div>`:`<div class="bubble" style="font-size:${currentFontSize}px">${escapeHtml(msg.text)}</div>`;if(!airwayEnabled){const cd=document.createElement('div');cd.className='message-content';if(isOwn)cd.innerHTML=`${content}<div class="message-meta"><span>${time}${editedMark}</span><span>${escapeHtml(msg.userName)}</span></div>`;else cd.innerHTML=`${content}<div class="message-meta"><span>${escapeHtml(msg.userName)}</span><span>${time}${editedMark}</span></div>`;if(msg.type==='image'){const img=cd.querySelector('img');if(img)img.onclick=e=>{e.stopPropagation();openImageViewer(msg.data)}}if(isOwn&&msg.userName!=='чат'){const ad=document.createElement('div');ad.className='message-actions';const eb=document.createElement('button');eb.className='action-btn';eb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="M15 5l4 4"/></svg>';eb.onclick=e=>{e.stopPropagation();startEditing(msgId,msg.text)};const db=document.createElement('button');db.className='action-btn';db.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 7l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/><path d="M9 3h6"/></svg>';db.onclick=e=>{e.stopPropagation();showDeletePopup(msgId)};ad.appendChild(eb);ad.appendChild(db);cd.appendChild(ad)}div.appendChild(cd)}else{let dn=msg.userName;const cs=msg.userName!=='чат'?`style="color:${getColorForUser(msg.userName)}"`:'';div.innerHTML=`<div class="bubble" style="padding:2px 8px;font-size:${currentFontSize}px"><span ${cs}>${escapeHtml(dn)}</span>: ${escapeHtml(msg.text)}</div>`;div.style.justifyContent='flex-start';div.style.flexDirection='row';div.style.alignSelf='flex-start'}messagesArea.appendChild(div);if(wasAtBottom)messagesArea.scrollTop=messagesArea.scrollHeight;if(airwayEnabled&&msg.type==='image'){const img=div.querySelector('img');if(img)img.onclick=e=>{e.stopPropagation();openImageViewer(msg.data)}}}
function renderAllMessages(){if(!messagesArea)return;saveScrollPosition();if(messages.length===0){messagesArea.innerHTML='<div class="empty-chat">🍃 здесь пока тишина</div>';return}messagesArea.innerHTML='';messages.forEach(msg=>addMessageToDOM(msg,msg.id));restoreScrollPosition()}
function loadMessagesFromFirebase(){if(!currentRoom)return;if(messagesRef)messagesRef();const q=query(ref(database,`rooms/${currentRoom}/messages`),limitToLast(100));messagesRef=onChildAdded(q,snapshot=>{const msg={id:snapshot.key,...snapshot.val()};if(!messages.find(m=>m.id===msg.id)){messages.push(msg);messages.sort((a,b)=>new Date(a.time)-new Date(b.time));addMessageToDOM(msg,msg.id);if(wasAtBottom)messagesArea.scrollTop=messagesArea.scrollHeight}})}
async function addMessage(type,content){if(type==='text'&&!content.trim())return;const newMsg={id:Date.now(),type,userName:currentName,time:new Date().toISOString()};if(type==='text'){if(content.length>500){alert('сообщение не длиннее 500 символов');return}newMsg.text=content}else if(type==='image')newMsg.data=content;try{await push(ref(database,`rooms/${currentRoom}/messages`),newMsg);return true}catch(e){alert('ошибка отправки');return false}}
function startEditing(msgId,currentText){editingMessageId=msgId;messageInput.value=currentText;messageInput.focus();originalSendSvg=sendBtn.innerHTML;sendBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';sendBtn.style.background='#2c6e6e';autoResize()}
function cancelEditing(){editingMessageId=null;messageInput.value='';if(originalSendSvg)sendBtn.innerHTML=originalSendSvg;sendBtn.style.background='';originalSendSvg=null;autoResize()}
async function saveEditedMessage(){if(!editingMessageId)return;const newText=messageInput.value.trim();if(!newText){cancelEditing();return}if(newText.length>500){alert('сообщение не длиннее 500 символов');return}if(newText!==messages.find(m=>m.id===editingMessageId)?.text)await update(ref(database,`rooms/${currentRoom}/messages/${editingMessageId}`),{text:newText,edited:true});cancelEditing()}
async function exitChat(){if(messagesRef){messagesRef();messagesRef=null}if(colorsListener){colorsListener();colorsListener=null}cancelEditing();currentRoom=null;currentName=null;messages=[];if(messagesArea)messagesArea.innerHTML='<div class="empty-chat">✨ введите ник и комнату</div>';if(roomNameSpan)roomNameSpan.innerText='воздушный чат';if(roomStatusSpan)roomStatusSpan.innerText='ожидание входа';if(modal)modal.style.display='flex';if(roomInput)roomInput.value='';if(nameInput)nameInput.value='';if(messageInput)messageInput.value=''}
function enterChat(){const name=nameInput.value.trim(),room=roomInput.value.trim();if(!name||!room){alert('введите ник и код комнаты');return}currentName=name;currentRoom=room;addRoomToHistory(currentRoom);localStorage.setItem('last_name',name);localStorage.setItem('last_room',room);roomNameSpan.innerText=`#${currentRoom}`;roomStatusSpan.innerText=`вы как ${currentName}`;modal.style.display='none';loadMessagesFromFirebase();if(airwayEnabled)startColorsListener();messageInput.focus()}
document.addEventListener('DOMContentLoaded',()=>{const ln=localStorage.getItem('last_name'),lr=localStorage.getItem('last_room');if(ln&&lr){nameInput.value=ln;roomInput.value=lr;enterChat()}});
async function sendOrSave(){if(!currentRoom||!currentName){modal.style.display='flex';return}if(editingMessageId){await saveEditedMessage();return}const text=messageInput.value.trim();if(text){await addMessage('text',text);messageInput.value='';messageInput.style.height='auto';messageInput.focus();autoResize()}}
async function sendImage(file){if(file.size>5*1024*1024){alert('файл не больше 5 МБ');fileInput.value='';return}if(!currentRoom||!currentName){modal.style.display='flex';fileInput.value='';return}const oh=sendBtn.innerHTML;sendBtn.innerHTML='<div class="loading-spinner"></div>';sendBtn.disabled=true;isLoadingImage=true;try{const url=await uploadImage(file);await addMessage('image',url)}catch(e){alert('ошибка загрузки фото')}finally{sendBtn.innerHTML=oh;sendBtn.disabled=false;isLoadingImage=false;fileInput.value=''}}
function autoResize(){messageInput.style.height='auto';const nh=Math.min(messageInput.scrollHeight,100);messageInput.style.height=nh+'px';messageInput.parentElement.style.maxHeight=nh+'px'}
messageInput.oninput=autoResize;
attachBtn.onclick=()=>fileInput.click();
fileInput.onchange=e=>{const f=e.target.files[0];if(!f)return;if(!f.type.startsWith('image/')){alert('выберите изображение (JPEG, PNG, WEBP, GIF)');fileInput.value='';return}sendImage(f)};
joinBtn.onclick=enterChat;
sendBtn.onclick=()=>{if(!isLoadingImage)sendOrSave()};
messageInput.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey&&!isLoadingImage){e.preventDefault();const text=messageInput.value.trim();if(text||editingMessageId)sendOrSave()}};
loadSettings();
</script>
</body>
